<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Campus Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #05070A;
            --surface: rgba(15, 20, 35, 0.6);
            --surface2: rgba(30, 40, 60, 0.7);
            --surface3: rgba(50, 60, 90, 0.8);
            --txt: #F0F4F8;
            --txt2: #A0AEC0;
            --txt3: #718096;
            --border: rgba(255, 255, 255, 0.12);
            --border2: rgba(255, 255, 255, 0.2);
            --r: 16px;
            --rs: 9px;
            --green: #00F5A0;
            --green-bg: rgba(0, 245, 160, 0.15);
            --green-txt: #00F5A0;
            --accent: #7B6FE0;
            --accent-bg: rgba(123, 111, 224, 0.15);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #05070A;
            color: var(--txt);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Performance Cosmic Canvas --- */
        #cosmic-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* ── Animations ── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes pulseRing {
            0% {
                box-shadow: 0 0 0 0 rgba(83, 74, 183, .45);
            }

            70% {
                box-shadow: 0 0 0 12px rgba(83, 74, 183, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(83, 74, 183, 0);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        /* ── layout ── */
        .wrap {
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 1.25rem 6rem
        }

        /* ── header ── */
        .header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
            animation: fadeInUp .5s ease both
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            letter-spacing: -0.5px;
            line-height: 1.1;
            background: linear-gradient(135deg, #FFF 30%, #7B6FE0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #534AB7, #1D9E75);
            transition: width 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            border-radius: 2px;
        }

        .header:hover h1::after {
            width: 100%;
        }

        .header p {
            font-size: 13px;
            color: var(--txt2);
            margin-top: 4px
        }

        .live-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--green-txt);
            background: var(--green-bg);
            padding: 5px 13px;
            border-radius: 99px;
            animation: fadeIn .6s ease both .2s;
            backdrop-filter: blur(8px)
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background: var(--green);
            border-radius: 50%;
            animation: blink 1.4s ease-in-out infinite
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        /* ── filter rows ── */
        .filter-block {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fadeInUp .5s ease both .15s
        }

        .filter-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--txt3);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 2px
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 7px
        }

        .filter {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 6px 18px;
            border-radius: 99px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--txt2);
            cursor: pointer;
            transition: all .2s cubic-bezier(.4, 0, .2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .filter:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .filter.on {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(123, 111, 224, 0.4);
        }

        .year-filter.on {
            background: linear-gradient(135deg, #7B6FE0, #9D72FF);
            border-color: #7B6FE0;
            color: #fff;
        }

        /* ── grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
            gap: 16px
        }

        /* ── card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            transition: transform .3s cubic-bezier(0.23, 1, 0.32, 1), box-shadow .3s cubic-bezier(0.23, 1, 0.32, 1), border-color .2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            animation: slideInUp 0.7s cubic-bezier(0.23, 1, 0.32, 1) both;
            position: relative;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--r);
            opacity: 0;
            transition: opacity .3s;
            background: linear-gradient(135deg, rgba(123, 111, 224, 0.1), rgba(0, 245, 160, 0.1));
            pointer-events: none
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4), 0 0 20px rgba(123, 111, 224, 0.2);
            border-color: rgba(123, 111, 224, 0.4);
        }

        .card:hover::after {
            opacity: 1
        }

        .card-stripe {
            height: 5px;
            flex-shrink: 0;
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite
        }

        .card-body {
            padding: 1rem 1.1rem;
            flex: 1;
            display: flex;
            flex-direction: column
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 7px
        }

        .card-top-left {
            display: flex;
            align-items: center;
            gap: 7px
        }

        .cat {
            font-size: 11px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 99px
        }

        .year-badge {
            font-size: 11px;
            font-weight: 500;
            padding: 3px 9px;
            border-radius: 99px;
            background: #EEEDFE;
            color: #534AB7
        }

        .card-date {
            font-size: 12px;
            color: var(--txt2)
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            line-height: 1.3;
            margin-bottom: 6px
        }

        .card-desc {
            font-size: 13px;
            color: var(--txt2);
            line-height: 1.55;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px
        }

        .chip {
            font-size: 12px;
            color: var(--txt2)
        }

        /* organizer strip */
        .organizer {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: var(--surface2);
            border-radius: 8px;
            margin-bottom: 10px
        }

        .org-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 500;
            flex-shrink: 0
        }

        .org-info {
            flex: 1;
            min-width: 0
        }

        .org-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--txt);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .org-contact {
            font-size: 11px;
            color: var(--txt2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .org-phone {
            font-size: 11px;
            color: var(--txt3)
        }

        /* card footer */
        .card-foot {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border)
        }

        .cap-wrap {
            flex: 1
        }

        .cap-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--txt2);
            margin-bottom: 4px
        }

        .cap-track {
            height: 5px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden
        }

        .cap-fill {
            height: 100%;
            border-radius: 3px;
            transition: width .6s cubic-bezier(.4, 0, .2, 1);
            position: relative
        }

        .btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 7px 18px;
            border-radius: 9px;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: all .2s cubic-bezier(.4, 0, .2, 1)
        }

        .btn-rsvp {
            background: linear-gradient(135deg, #7B6FE0, #9D72FF);
            color: #fff;
            box-shadow: 0 4px 15px rgba(123, 111, 224, 0.3)
        }

        .btn-rsvp:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, .25)
        }

        .btn-rsvp:active {
            transform: scale(0.96);
        }

        .btn-done {
            background: var(--green-bg);
            color: var(--green-txt);
            cursor: default;
            font-weight: 500
        }

        .btn-full {
            background: rgba(255, 255, 255, 0.05);
            color: var(--txt3);
            cursor: not-allowed;
            border: 1px solid var(--border);
        }

        /* ── Auth Styles ── */
        .header-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .auth-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            box-shadow: none;
        }
        
        .btn-outline:hover {
            background: rgba(123, 111, 224, 0.1);
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #7B6FE0, #9D72FF);
            color: #fff;
            box-shadow: 0 4px 15px rgba(123, 111, 224, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123, 111, 224, 0.4);
        }
        
        .auth-toggle {
            text-align: center;
            font-size: 13px;
            color: var(--txt2);
            margin-top: 16px;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .auth-toggle:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        /* ── RSVP modal ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s
        }

        .overlay.show {
            opacity: 1;
            pointer-events: all
        }

        .modal {
            background: var(--surface);
            border-radius: 20px;
            width: 100%;
            max-width: 430px;
            padding: 1.6rem;
            border: 1px solid var(--border);
            transform: translateY(16px) scale(.97);
            transition: transform .3s cubic-bezier(.4, 0, .2, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .15)
        }

        .overlay.show .modal {
            transform: translateY(0) scale(1)
        }

        .modal-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1.1rem
        }

        .modal-head h2 {
            font-family: 'Playfair Display', serif;
            font-size: 19px;
            line-height: 1.3;
            max-width: 330px
        }

        .close-btn {
            background: none;
            border: 1px solid var(--border2);
            border-radius: 8px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            color: var(--txt2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .close-btn:hover {
            background: var(--surface2)
        }

        .modal-meta {
            background: var(--surface2);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 1.1rem;
            font-size: 13px;
            color: var(--txt2);
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .field {
            margin-bottom: 14px
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--txt2);
            margin-bottom: 5px
        }

        .field input {
            width: 100%;
            padding: 9px 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            border: 1px solid var(--border2);
            border-radius: 8px;
            background: var(--surface);
            color: var(--txt);
            outline: none;
            transition: border-color .15s
        }

        .field input:focus {
            border-color: rgba(0, 0, 0, .4)
        }

        .err {
            font-size: 12px;
            color: #c0392b;
            margin-top: -8px;
            margin-bottom: 8px;
            display: none
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #1a1917, #333);
            color: var(--surface);
            transition: all .2s cubic-bezier(.4, 0, .2, 1);
            margin-top: 4px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .15)
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, .2)
        }

        .submit-btn:disabled {
            opacity: .45;
            cursor: not-allowed;
            transform: none;
            box-shadow: none
        }

        .success-area {
            text-align: center;
            padding: 1rem 0;
            display: none
        }

        .success-icon {
            font-size: 42px;
            margin-bottom: 12px;
            display: inline-block;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        .success-area h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            margin-bottom: 6px
        }

        .success-area p {
            font-size: 13px;
            color: var(--txt2)
        }

        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--txt2);
            font-size: 14px
        }

        /* ── Chatbot FAB ── */
        .fab {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 300;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #534AB7, #7B6FE0);
            color: #fff;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(83, 74, 183, .35);
            transition: transform .2s cubic-bezier(.4, 0, .2, 1), box-shadow .2s;
            animation: pulseRing 2.5s ease-out infinite
        }

        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 28px rgba(83, 74, 183, .45)
        }

        .fab.open-state {
            background: linear-gradient(135deg, #E24B4A, #F06060);
            animation: none;
            box-shadow: 0 4px 20px rgba(226, 75, 74, .35)
        }

        /* ── Chat panel ── */
        .chat-panel {
            position: fixed;
            bottom: 96px;
            right: 28px;
            z-index: 300;
            width: 370px;
            max-height: 530px;
            background: var(--surface);
            border: 1px solid rgba(83, 74, 183, .12);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 48px rgba(0, 0, 0, .14), 0 2px 12px rgba(83, 74, 183, .08);
            opacity: 0;
            pointer-events: none;
            transform: translateY(16px) scale(.96);
            transition: opacity .25s, transform .3s cubic-bezier(.4, 0, .2, 1)
        }

        .chat-panel.open {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0) scale(1)
        }

        .chat-header {
            padding: 14px 16px 12px;
            background: linear-gradient(135deg, #534AB7, #7B6FE0);
            border-radius: 20px 20px 0 0;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .chat-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0
        }

        .chat-header-txt {
            flex: 1
        }

        .chat-header-txt strong {
            font-size: 14px;
            font-weight: 500;
            display: block;
            color: #fff
        }

        .chat-header-txt span {
            font-size: 11px;
            color: rgba(255, 255, 255, .75)
        }

        .chat-close {
            background: rgba(255, 255, 255, .15);
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #fff;
            padding: 2px 7px;
            border-radius: 6px;
            transition: background .15s
        }

        .chat-close:hover {
            background: rgba(255, 255, 255, .25)
        }

        .chat-msgs {
            flex: 1;
            overflow-y: auto;
            padding: 14px 14px 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth
        }

        .msg {
            max-width: 85%;
            font-size: 13px;
            line-height: 1.55;
            padding: 10px 14px;
            border-radius: 14px;
            animation: fadeInUp .25s ease both;
            white-space: pre-line
        }

        .msg.bot {
            background: var(--surface2);
            color: var(--txt);
            align-self: flex-start;
            border-bottom-left-radius: 4px
        }

        .msg.user {
            background: linear-gradient(135deg, #534AB7, #7B6FE0);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(83, 74, 183, .2)
        }

        .msg.typing {
            color: var(--txt3);
            font-style: italic
        }

        .chat-foot {
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px
        }

        .chat-foot input {
            flex: 1;
            padding: 9px 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            border: 1px solid var(--border2);
            border-radius: 10px;
            background: var(--surface);
            color: var(--txt);
            outline: none;
            transition: border-color .2s, box-shadow .2s
        }

        .chat-foot input:focus {
            border-color: rgba(83, 74, 183, .4);
            box-shadow: 0 0 0 3px rgba(83, 74, 183, .08)
        }

        .chat-send {
            padding: 9px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #534AB7, #7B6FE0);
            color: #fff;
            cursor: pointer;
            transition: all .2s cubic-bezier(.4, 0, .2, 1);
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(83, 74, 183, .2)
        }

        .chat-send:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(83, 74, 183, .3)
        }

        .chat-send:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none
        }

        .suggested-qs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 0 14px 10px
        }

        .sq {
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 99px;

        }

        }

    <!-- Auth Modal -->
    <div class="overlay" id="auth-overlay" onclick="closeAuthModal(event)">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="auth-title">
            <div class="modal-head">
                <h2 id="auth-title">Sign Up</h2>
                <button class="close-btn" onclick="closeAuthModal()">×</button>
            </div>
            <div id="auth-form-area">
                <div class="field" id="auth-name-field">
                    <label for="auth-name">Full Name</label>
                    <input id="auth-name" type="text" placeholder="e.g. Alex Chen" autocomplete="name">
                </div>
                <div class="field">
                    <label for="auth-email">Email address</label>

    <!-- Chatbot -->

                category: "Social", date: "Sat, June 21", time: "6:00 PM", venue: "Main Lawn", capacity: 150,

                organizer: { name: "Sarah Connor", email: "sarah.c@campus.edu", phone: "+91 77700 33344", avatarBg: "rgba(255, 212, 59, 0.2)", avatarTxt: "#FFD43B" }
            },
            {
                id: "evt12", year: 2026, title: "Cosmic Hackathon: Deep Space AI",
                desc: "Can AI help us find exoplanets? Participate in this 48-hour challenge to build models that analyze data from the James Webb Space Telescope.",
                category: "Academic", date: "Fri, July 4", time: "10:00 AM", venue: "Innovation Hub", capacity: 100,
                color: "#CC5DE8", catBg: "rgba(204, 93, 232, 0.15)", catTxt: "#CC5DE8",
                organizer: { name: "Vikram Singh", email: "vikram.s@campus.edu", phone: "+91 66600 44455", avatarBg: "rgba(204, 93, 232, 0.2)", avatarTxt: "#CC5DE8" }
            },
            {
                id: "evt13", year: 2026, title: "Zero Gravity Yoga",
                desc: "Experience yoga like never before. Suspended in our state-of-the-art anti-gravity harnesses, you'll stretch and meditate while floating.",
                category: "Sports", date: "Tue, Aug 12", time: "7:00 AM", venue: "Gymnasium B", capacity: 40,
                color: "#FF922B", catBg: "rgba(255, 146, 43, 0.15)", catTxt: "#FF922B",
                organizer: { name: "Master Ken", email: "ken.yoga@campus.edu", phone: "+91 88800 55566", avatarBg: "rgba(255, 146, 43, 0.2)", avatarTxt: "#FF922B" }
            },
            {
                id: "evt14", year: 2026, title: "Asteroid Mining Ethics Panel",
                desc: "Who owns the asteroids? A debate featuring top professors from Law and Engineering on the future of space resources.",
                category: "Academic", date: "Thu, Sep 18", time: "4:00 PM", venue: "Law Building Auditorium", capacity: 250,
                color: "#20C997", catBg: "rgba(32, 201, 151, 0.15)", catTxt: "#20C997",
                organizer: { name: "Prof. Elena Rostova", email: "elena.r@campus.edu", phone: "+91 99900 66677", avatarBg: "rgba(32, 201, 151, 0.2)", avatarTxt: "#20C997" }
            }
        ];

        // ── State ─────────────────────────────────────────────────────────────────────
        const rsvpCounts = {}, rsvpEmails = {};
        const userRsvps = new Set();
        EVENTS.forEach(ev => { rsvpCounts[ev.id] = 0; rsvpEmails[ev.id] = new Set(); });

        let activeCat = "All";
        let activeYear = "All";
        let activeEventId = null;

        const CATS = ["All", "Academic", "Social", "Sports", "Arts", "Food"];
        const YEARS = ["All", ...new Set(EVENTS.map(e => e.year))].sort((a, b) => a === "All" ? -1 : a - b);

        // ── Render Filters ────────────────────────────────────────────────────────────
        function renderFilters() {
            document.getElementById("cat-filters").innerHTML =
                CATS.map(c => `<button class="filter${c === activeCat ? " on" : ""}" onclick="setCat('${c}')">${c}</button>`).join("");
            document.getElementById("year-filters").innerHTML =
                YEARS.map(y => `<button class="filter year-filter${y === activeYear ? " on" : ""}" onclick="setYear('${y}')">${y}</button>`).join("");
        }

        // ── Render Grid ───────────────────────────────────────────────────────────────
        function pct(id) {
            const ev = EVENTS.find(e => e.id === id);
            return ev ? Math.min(100, Math.round(rsvpCounts[id] / ev.capacity * 100)) : 0;
        }
        function barColor(ev) {
            const p = pct(ev.id);
            return p >= 90 ? "#E24B4A" : p >= 70 ? "#EF9F27" : ev.color;
        }
        function initials(name) {
            return name.split(" ").map(n => n[0]).slice(0, 2).join("").toUpperCase();
        }

        function renderGrid() {
            let filtered = EVENTS;
            if (activeCat !== "All") filtered = filtered.filter(e => e.category === activeCat);
            if (activeYear !== "All") filtered = filtered.filter(e => String(e.year) === String(activeYear));

            const grid = document.getElementById("grid");
            if (!filtered.length) {
                grid.innerHTML = `<div class="empty">No events match the selected filters.</div>`;
                return;
            }

            grid.innerHTML = filtered.map((ev, idx) => {
                const count = rsvpCounts[ev.id];
                const p = pct(ev.id);
                const full = count >= ev.capacity;
                const done = userRsvps.has(ev.id);
                const btnCls = done ? "btn btn-done" : full ? "btn btn-full" : "btn btn-rsvp";
                const btnTxt = done ? "✓ Going" : full ? "Full" : "RSVP";
                const clickFn = (!done && !full) ? `openModal('${ev.id}')` : "";
                const org = ev.organizer;
                const delay = idx * 0.07;

                return `
    <div class="card" onclick="${clickFn}" style="animation-delay:${delay}s">
      <div class="card-stripe" style="background:${ev.color}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-top-left">
            <span class="cat" style="background:${ev.catBg};color:${ev.catTxt}">${ev.category}</span>
            <span class="year-badge">${ev.year}</span>
          </div>
          <span class="card-date">${ev.date}</span>
        </div>
        <div class="card-title">${ev.title}</div>
        <div class="card-desc">${ev.desc}</div>
        <div class="chips">
          <span class="chip">🕐 ${ev.time}</span>
          <span class="chip">📍 ${ev.venue}</span>
        </div>
        <div class="organizer" onclick="event.stopPropagation()">
          <div class="org-avatar" style="background:${org.avatarBg};color:${org.avatarTxt}">${initials(org.name)}</div>
          <div class="org-info">
            <div class="org-name">👤 ${org.name}</div>
            <div class="org-contact">✉️ <a href="mailto:${org.email}" style="color:inherit;text-decoration:none">${org.email}</a></div>
            <div class="org-phone">📞 ${org.phone}</div>
          </div>
        </div>
        <div class="card-foot">
          <div class="cap-wrap">
            <div class="cap-label">
              <span>${count}/${ev.capacity} spots</span>
              <span>${p}%</span>
            </div>
            <div class="cap-track">
              <div class="cap-fill" style="width:${p}%;background:${barColor(ev)}"></div>
            </div>
          </div>
          <button class="${btnCls}" onclick="event.stopPropagation();${clickFn}">${btnTxt}</button>
        </div>
      </div>
    </div>`;
            }).join("");

            const total = Object.values(rsvpCounts).reduce((a, b) => a + b, 0);
            document.getElementById("summary").textContent =
                `${filtered.length} event${filtered.length !== 1 ? "s" : ""} · ${total} total RSVPs`;
        }

        function render() {
            const grid = document.getElementById("grid");
            grid.style.opacity = "0.4";
            grid.style.transform = "translateY(8px)";
            grid.style.transition = "none";

            setTimeout(() => {
                renderFilters();
                renderGrid();
                grid.style.transition = "all 0.4s cubic-bezier(0.23, 1, 0.32, 1)";
                grid.style.opacity = "1";
                grid.style.transform = "translateY(0)";
            }, 50);
        }
        function setCat(c) { activeCat = c; render(); }
        function setYear(y) { activeYear = y; render(); }

        // ── RSVP Modal ────────────────────────────────────────────────────────────────
        function openModal(id) {
            activeEventId = id;
            const ev = EVENTS.find(e => e.id === id);
            document.getElementById("modal-title").textContent = ev.title;
            document.getElementById("modal-meta").innerHTML =
                `<span>📅 ${ev.date} · ${ev.time}</span><span>📍 ${ev.venue}</span>
     <span>👤 Organiser: ${ev.organizer.name} — <a href="mailto:${ev.organizer.email}" style="color:inherit">${ev.organizer.email}</a></span>`;
            document.getElementById("inp-name").value = "";
            document.getElementById("inp-email").value = "";
            document.getElementById("err-msg").style.display = "none";
            document.getElementById("form-area").style.display = "block";
            document.getElementById("success-area").style.display = "none";
            document.getElementById("submit-btn").disabled = false;
            document.getElementById("submit-btn").textContent = "Confirm RSVP →";
            document.getElementById("overlay").classList.add("show");
            setTimeout(() => document.getElementById("inp-name").focus(), 220);
            document.addEventListener("keydown", onEsc);
        }
        function closeModal(e) {
            if (e && e.target !== document.getElementById("overlay")) return;
            document.getElementById("overlay").classList.remove("show");
            activeEventId = null;
            document.removeEventListener("keydown", onEsc);
        }
        function onEsc(e) { if (e.key === "Escape") closeModal(); }
        function setErr(msg) {
            const el = document.getElementById("err-msg");
            el.textContent = msg; el.style.display = msg ? "block" : "none";
        }
        function submitRsvp() {
            const name = document.getElementById("inp-name").value.trim();
            const email = document.getElementById("inp-email").value.trim().toLowerCase();
            if (!name) { setErr("Please enter your name."); return; }
            if (!email.includes("@")) { setErr("Please enter a valid email address."); return; }
            setErr("");
            const ev = EVENTS.find(e => e.id === activeEventId);
            if (rsvpCounts[activeEventId] >= ev.capacity) { setErr("Sorry, this event is now full."); return; }
            if (rsvpEmails[activeEventId].has(email)) { setErr("This email is already registered."); return; }
            rsvpEmails[activeEventId].add(email);
            rsvpCounts[activeEventId]++;
            userRsvps.add(activeEventId);
            document.getElementById("form-area").style.display = "none";
            document.getElementById("success-area").style.display = "block";
            document.getElementById("success-msg").textContent = `See you at ${ev.title}. We'll send details to ${email}.`;
            render();
            setTimeout(() => { closeModal(); }, 2000);
        }
        document.getElementById("inp-email").addEventListener("keydown", e => { if (e.key === "Enter") submitRsvp(); });

        // ── Auth Modal ────────────────────────────────────────────────────────────────
        let authMode = 'signup'; // 'signup' or 'login'

        function openAuth(mode) {
            authMode = mode;
            updateAuthUI();
            document.getElementById("auth-name").value = "";
            document.getElementById("auth-email").value = "";
            document.getElementById("auth-password").value = "";
            document.getElementById("auth-err-msg").style.display = "none";
            document.getElementById("auth-form-area").style.display = "block";
            document.getElementById("auth-success-area").style.display = "none";
            document.getElementById("auth-submit-btn").disabled = false;
            document.getElementById("auth-overlay").classList.add("show");
            setTimeout(() => document.getElementById(mode === 'signup' ? "auth-name" : "auth-email").focus(), 220);
        }

        function closeAuthModal(e) {
            if (e && e.target !== document.getElementById("auth-overlay")) return;
            document.getElementById("auth-overlay").classList.remove("show");
        }

        function toggleAuthMode() {
            authMode = authMode === 'signup' ? 'login' : 'signup';
            updateAuthUI();
        }

        function updateAuthUI() {
            const isLogin = authMode === 'login';
            document.getElementById("auth-title").textContent = isLogin ? "Welcome Back" : "Create Account";
            document.getElementById("auth-name-field").style.display = isLogin ? "none" : "block";
            document.getElementById("auth-submit-btn").textContent = isLogin ? "Login →" : "Sign Up →";
            document.getElementById("auth-toggle-link").textContent = isLogin ? "Don't have an account? Sign Up" : "Already have an account? Login";
        }

        function setAuthErr(msg) {
            const el = document.getElementById("auth-err-msg");
            el.textContent = msg; el.style.display = msg ? "block" : "none";
        }

        function submitAuth() {
            const email = document.getElementById("auth-email").value.trim();
            const password = document.getElementById("auth-password").value;
            
            if (authMode === 'signup') {
                const name = document.getElementById("auth-name").value.trim();
                if (!name) { setAuthErr("Please enter your name."); return; }
            }
            if (!email.includes("@")) { setAuthErr("Please enter a valid email address."); return; }
            if (password.length < 6) { setAuthErr("Password must be at least 6 characters."); return; }
            
            setAuthErr("");
            document.getElementById("auth-form-area").style.display = "none";
            document.getElementById("auth-success-area").style.display = "block";
            
            if (authMode === 'signup') {
                document.getElementById("auth-success-title").textContent = "Account Created!";
                document.getElementById("auth-success-msg").textContent = "Welcome to the Campus Event Finder.";
            } else {
                document.getElementById("auth-success-title").textContent = "Logged In!";
                document.getElementById("auth-success-msg").textContent = "Great to see you again.";
            }
            
            setTimeout(() => { closeAuthModal(); }, 2000);
        }

        // ── Chatbot (Local Engine) ────────────────────────────────────────────────────
        let chatOpen = false;
        let chatHistory = [];
        let chatBotBusy = false;

        const SUGGESTED = [
            "What events are coming up?",
            "Any food events?",
            "How do I RSVP?",
            "Who organises the hackathon?",
        ];

        // ── Local bot intent engine ──────────────────────────────────────────────
        function fuzzyMatch(text, keyword) {
            return text.toLowerCase().includes(keyword.toLowerCase());
        }

        function findEvents(query) {
            const q = query.toLowerCase();
            return EVENTS.filter(ev =>
                fuzzyMatch(ev.title, q) ||
                fuzzyMatch(ev.category, q) ||
                fuzzyMatch(ev.desc, q) ||
                fuzzyMatch(ev.venue, q) ||
                fuzzyMatch(ev.organizer.name, q) ||
                fuzzyMatch(String(ev.year), q)
            );
        }

        function detectIntent(query) {
            const q = query.toLowerCase();

            // Greeting
            if (/^(hi|hello|hey|sup|yo|hola|good\s*(morning|afternoon|evening))/.test(q))
                return { intent: "greeting" };

            // Thanks
            if (/^(thanks|thank you|thx|ty|cheers)/.test(q))
                return { intent: "thanks" };

            // RSVP how-to
            if (/how.*(rsvp|register|sign\s*up|book|join)|rsvp.*how|register.*how/.test(q))
                return { intent: "rsvp_help" };

            // Capacity / spots / full
            if (/capacity|spots|full|seats|how many.*left|space|availability/.test(q)) {
                const matches = findEventsByKeywords(q);
                return { intent: "capacity", events: matches };
            }

            // Organizer / who organises / contact
            if (/who.*(organis|organiz|runs|hosts|contact|in charge)|organis|organiz|contact.*for|email.*for|phone.*for/.test(q)) {
                const matches = findEventsByKeywords(q);
                return { intent: "organizer", events: matches };
            }

            // When / time / date / schedule
            if (/when|what time|what date|schedule|timing|starts?\b/.test(q)) {
                const matches = findEventsByKeywords(q);
                return { intent: "when", events: matches };
            }

            // Where / venue / location
            if (/where|venue|location|place|which (hall|room|building|ground)/.test(q)) {
                const matches = findEventsByKeywords(q);
                return { intent: "where", events: matches };
            }

            // Category-based
            const cats = ["academic", "social", "sports", "arts", "food"];
            for (const cat of cats) {
                if (q.includes(cat)) {
                    const matches = EVENTS.filter(e => e.category.toLowerCase() === cat);
                    return { intent: "category", category: cat, events: matches };
                }
            }

            // Year-based
            const yearMatch = q.match(/\b(2025|2026|2027)\b/);
            if (yearMatch) {
                const yr = parseInt(yearMatch[1]);
                const matches = EVENTS.filter(e => e.year === yr);
                return { intent: "year", year: yr, events: matches };
            }

            // List all / upcoming / events
            if (/all events|upcoming|what.*events|list.*events|show.*events|events.*coming|coming up|what's on|whats on/.test(q))
                return { intent: "list_all" };

            // Search by keywords
            const matches = findEventsByKeywords(q);
            if (matches.length > 0)
                return { intent: "search", events: matches };

            return { intent: "unknown" };
        }

        function findEventsByKeywords(query) {
            const q = query.toLowerCase();
            // Remove common stop words for better matching
            const stopWords = ["the", "a", "an", "is", "are", "was", "were", "what", "when", "where", "who", "how", "do", "does", "can", "could", "about", "for", "of", "in", "at", "to", "and", "or", "any", "tell", "me", "show", "find", "get"];
            const words = q.split(/\s+/).filter(w => w.length > 2 && !stopWords.includes(w));
            if (words.length === 0) return [];

            return EVENTS.filter(ev => {
                const blob = `${ev.title} ${ev.category} ${ev.desc} ${ev.venue} ${ev.organizer.name} ${ev.year}`.toLowerCase();
                return words.some(w => blob.includes(w));
            });
        }

        function formatEventShort(ev) {
            return `📌 ${ev.title} — ${ev.date} at ${ev.time}, ${ev.venue}`;
        }

        function generateReply(query) {
            const { intent, events, category, year } = detectIntent(query);

            switch (intent) {
                case "greeting":
                    return "Hey there! 👋 I'm your campus events assistant. Ask me about upcoming events, how to RSVP, or anything else event-related!";

                case "thanks":
                    return "You're welcome! 😊 Let me know if you need anything else about campus events.";

                case "rsvp_help":
                    return "To RSVP for an event, just click the \"RSVP\" button on any event card. You'll need to enter your name and email address. It's quick and easy! 🎟️";

                case "list_all": {
                    const lines = EVENTS.map(formatEventShort);
                    return `Here are all ${EVENTS.length} upcoming events:\n\n${lines.join("\n")}\n\nClick on any event card to RSVP!`;
                }

                case "category": {
                    if (!events || events.length === 0)
                        return `I don't see any ${category} events right now. Check back later!`;
                    const lines = events.map(formatEventShort);
                    return `Here are the ${category} events:\n\n${lines.join("\n")}`;
                }

                case "year": {
                    if (!events || events.length === 0)
                        return `No events found for ${year}.`;
                    const lines = events.map(formatEventShort);
                    return `Events in ${year}:\n\n${lines.join("\n")}`;
                }

                case "organizer": {
                    if (!events || events.length === 0)
                        return "Which event are you asking about? Try mentioning the event name (e.g. \"Who organises the hackathon?\")";
                    return events.map(ev =>
                        `👤 ${ev.title} is organised by ${ev.organizer.name}.\n✉️ Email: ${ev.organizer.email}\n📞 Phone: ${ev.organizer.phone}`
                    ).join("\n\n");
                }

                case "when": {
                    if (!events || events.length === 0)
                        return "Which event are you asking about? Try mentioning the event name.";
                    return events.map(ev =>
                        `🕐 ${ev.title} is on ${ev.date} at ${ev.time}.`
                    ).join("\n");
                }

                case "where": {
                    if (!events || events.length === 0)
                        return "Which event's location are you looking for? Try mentioning the event name.";
                    return events.map(ev =>
                        `📍 ${ev.title} is at ${ev.venue}.`
                    ).join("\n");
                }

                case "capacity": {
                    if (!events || events.length === 0)
                        return "Which event are you asking about? Try mentioning the event name.";
                    return events.map(ev => {
                        const count = rsvpCounts[ev.id];
                        const left = ev.capacity - count;
                        return left > 0
                            ? `${ev.title}: ${left} spots remaining out of ${ev.capacity} (${count} RSVPs so far).`
                            : `${ev.title}: This event is FULL! (${ev.capacity}/${ev.capacity})`;
                    }).join("\n");
                }

                case "search": {
                    if (events.length === 1) {
                        const ev = events[0];
                        const count = rsvpCounts[ev.id];
                        const left = ev.capacity - count;
                        return `📌 ${ev.title} (${ev.category})\n📅 ${ev.date} at ${ev.time}\n📍 ${ev.venue}\n👤 Organised by: ${ev.organizer.name} (${ev.organizer.email})\n🎟️ ${left > 0 ? left + " spots remaining" : "FULL"} out of ${ev.capacity}.\n\n${ev.desc}`;
                    }
                    const lines = events.map(formatEventShort);
                    return `I found ${events.length} matching events:\n\n${lines.join("\n")}\n\nAsk me about a specific one for more details!`;
                }

                default:
                    return "I'm not sure I understand. Try asking about:\n• Upcoming events\n• A specific event (e.g. \"Tell me about the hackathon\")\n• How to RSVP\n• Organiser contact info\n• Event venues or timings";
            }
        }

        // ── Chat UI functions ────────────────────────────────────────────────────
        function renderSuggestions() {
            const el = document.getElementById("suggested-qs");
            if (chatHistory.length > 0) { el.innerHTML = ""; return; }
            el.innerHTML = SUGGESTED.map(q =>
                `<button class="sq" onclick="askSuggested('${q.replace(/'/g, "\\'")}')">${q}</button>`
            ).join("");
        }

        function toggleChat() {
            chatOpen = !chatOpen;
            document.getElementById("chat-panel").classList.toggle("open", chatOpen);
            document.getElementById("fab").classList.toggle("open-state", chatOpen);
            document.getElementById("fab").textContent = chatOpen ? "×" : "💬";
            if (chatOpen) {
                const msgs = document.getElementById("chat-msgs");
                if (msgs.children.length === 0) {
                    appendMsg("bot", "Hi! 👋 I'm your campus events assistant. Ask me about upcoming events, how to RSVP, or get organiser contact info.");
                }
                renderSuggestions();
                setTimeout(() => document.getElementById("chat-input").focus(), 200);
            }
        }

        function appendMsg(role, text) {
            const el = document.createElement("div");
            el.className = `msg ${role}`;
            el.textContent = text;
            const msgs = document.getElementById("chat-msgs");
            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
            return el;
        }

        function setTyping(show) {
            let existing = document.getElementById("typing-indicator");
            if (show && !existing) {
                const el = appendMsg("bot typing", "…");
                el.id = "typing-indicator";
            } else if (!show && existing) {
                existing.remove();
            }
        }

        async function sendChat() {
            const input = document.getElementById("chat-input");
            const text = input.value.trim();
            if (!text || chatBotBusy) return;
            input.value = "";
            document.getElementById("suggested-qs").innerHTML = "";
            appendMsg("user", text);
            chatHistory.push({ role: "user", content: text });
            chatBotBusy = true;
            document.getElementById("chat-send").disabled = true;
            setTyping(true);

            // Simulate a brief typing delay for natural feel
            await new Promise(r => setTimeout(r, 400 + Math.random() * 400));

            const reply = generateReply(text);
            setTyping(false);
            appendMsg("bot", reply);
            chatHistory.push({ role: "assistant", content: reply });

            chatBotBusy = false;
            document.getElementById("chat-send").disabled = false;
            document.getElementById("chat-input").focus();
        }

        function askSuggested(q) {
            document.getElementById("chat-input").value = q;
            sendChat();
        }

        document.getElementById("chat-input").addEventListener("keydown", e => {
            if (e.key === "Enter") sendChat();
        });

        // ── High Performance Canvas Background ───────────────────────────────────
        function initCosmos() {
            const canvas = document.getElementById('cosmic-canvas');
            const ctx = canvas.getContext('2d', { alpha: false }); // Optimize for no transparency to background
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            const isMobile = width < 768;
            const starCount = isMobile ? 80 : 250;
            const stars = [];

            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.5 + 0.2,
                    speedY: Math.random() * 0.3 + 0.05,
                    alpha: Math.random(),
                    alphaDir: (Math.random() > 0.5 ? 1 : -1) * 0.015
                });
            }

            let mouseX = 0;
            let mouseY = 0;
            let targetMouseX = 0;
            let targetMouseY = 0;

            if (!isMobile) {
                document.addEventListener('mousemove', (e) => {
                    targetMouseX = (e.clientX - width / 2) * 0.04;
                    targetMouseY = (e.clientY - height / 2) * 0.04;
                }, { passive: true }); // Passive listener for better scroll performance
            }

            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }, { passive: true });

            function draw() {
                // Smooth mouse interpolation
                mouseX += (targetMouseX - mouseX) * 0.05;
                mouseY += (targetMouseY - mouseY) * 0.05;

                // Base deep space
                const bgGradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height));
                bgGradient.addColorStop(0, '#1B2735');
                bgGradient.addColorStop(1, '#05070A');
                ctx.fillStyle = bgGradient;
                ctx.fillRect(0, 0, width, height);

                // Draw Nebulae
                if (!isMobile) {
                    const r = Math.max(width, height) * 0.4;
                    
                    // Purple Nebula (Layer 1)
                    const x1 = width*0.2 - mouseX;
                    const y1 = height*0.3 - mouseY;
                    const g1 = ctx.createRadialGradient(x1, y1, 0, x1, y1, r);
                    g1.addColorStop(0, 'rgba(123, 111, 224, 0.15)');
                    g1.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = g1;
                    ctx.fillRect(0, 0, width, height);

                    // Cyan Nebula (Layer 2)
                    const x2 = width*0.8 - mouseX*1.5;
                    const y2 = height*0.7 - mouseY*1.5;
                    const g2 = ctx.createRadialGradient(x2, y2, 0, x2, y2, r*0.8);
                    g2.addColorStop(0, 'rgba(0, 245, 160, 0.1)');
                    g2.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = g2;
                    ctx.fillRect(0, 0, width, height);
                }

                // Draw 3 Orbital Rings (Domain Circles)
                ctx.lineWidth = 1;
                const ringColors = ['rgba(123, 111, 224, 0.15)', 'rgba(0, 245, 160, 0.12)', 'rgba(77, 171, 247, 0.15)'];
                const time = Date.now() * 0.0002;
                
                for(let i=0; i<3; i++) {
                    ctx.strokeStyle = ringColors[i];
                    ctx.beginPath();
                    
                    // Slightly offset centers for a 3D orbital feel
                    const cx = width/2 + Math.cos(time + i*2.5) * (40 + i*15) - mouseX * (0.3 + i*0.1);
                    const cy = height/2 + Math.sin(time + i*2.5) * (40 + i*15) - mouseY * (0.3 + i*0.1);
                    
                    // Large sizes scaling with screen
                    const r = Math.max(width, height) * (0.25 + i*0.12); 
                    
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Draw Stars
                ctx.fillStyle = '#FFF';
                stars.forEach(star => {
                    star.y -= star.speedY;
                    if (star.y < 0) {
                        star.y = height;
                        star.x = Math.random() * width;
                    }

                    star.alpha += star.alphaDir;
                    if (star.alpha <= 0.1 || star.alpha >= 1) star.alphaDir *= -1;

                    ctx.globalAlpha = Math.max(0.1, Math.min(1, star.alpha));
                    ctx.beginPath();
                    
                    // Star parallax (closer stars move more)
                    const px = star.x - mouseX * (star.size * 0.8);
                    const py = star.y - mouseY * (star.size * 0.8);
                    
                    // Wrap around horizontal
                    let finalX = px;
                    if (finalX < 0) finalX += width;
                    if (finalX > width) finalX -= width;

                    ctx.arc(finalX, py, star.size, 0, Math.PI * 2);
                    ctx.fill();
                });

                ctx.globalAlpha = 1;
                requestAnimationFrame(draw);
            }
            
            // Start loop
            requestAnimationFrame(draw);
        }

        // ── Boot ──────────────────────────────────────────────────────────────────────
        initCosmos();
        render();
    </script>
</body>
